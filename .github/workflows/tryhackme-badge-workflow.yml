name: TryHackMe Update Badge
on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

# BOTUN DEPOYA RESMİ KAYDEDEBİLMESİ İÇİN GEREKEN İZİN
permissions:
  contents: write

jobs:
  tryhackme-badge-update:
    name: Update this repo's tryhackme badge with the latest tryhackme image badge
    runs-on: ubuntu-latest
    # GitHub'ın uyarısını çözmek için Node 24'ü zorunlu kılma
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      # güncel sürüm v4
      - uses: actions/checkout@v4
      - uses: p4p1/tryhackme-badge-workflow@main
        with:
          # BURAYI KENDİ TRYHACKME KULLANICI ADINIZLA DEĞİŞTİRMEYİ UNUTMAYIN
          username: "RennnSkywalker"
          GITHUB_TOKEN: ${{secrets.GITHUB_TOKEN}}
