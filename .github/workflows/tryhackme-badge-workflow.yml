name: TryHackMe Update Badge
on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

# Bota yazma izni veriyoruz
permissions:
  contents: write

jobs:
  tryhackme-badge-update:
    runs-on: ubuntu-latest
    steps:
      # 1. Deponuzu Actions sunucusuna kopyalar
      - uses: actions/checkout@v4
      
      # 2. Assets klasörü yoksa oluşturur (varsa dokunmaz)
      - name: Klasör Oluştur
        run: mkdir -p assets
        
      # 3. TryHackMe'den güncel rozetinizi indirip klasöre kaydeder
      # DİKKAT: TRYHACKME_KULLANICI_ADINIZ yazan yeri değiştirmeyi unutmayın!
      - name: Rozeti İndir
        run: curl -o assets/thm_propic.png https://tryhackme-badges.s3.amazonaws.com/RennnSkywalker.png
        
      # 4. Değişiklikleri deponuza (GitHub'a) yükler
      - name: GitHub'a Kaydet ve Pushla
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Güncel TryHackMe rozeti eklendi 🚀"
          file_pattern: 'assets/thm_propic.png'
